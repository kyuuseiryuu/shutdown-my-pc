name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (single exe)
        run: bun run build

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShutdownMyPC-x64-windows
          path: out/ShutdownMyPC.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ShutdownMyPC-x64-windows
          path: .

      - name: Generate checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum ShutdownMyPC.exe | cut -d' ' -f1)
          echo "$CHECKSUM  ShutdownMyPC.exe" > checksums.txt
          echo "value=$CHECKSUM" >> "$GITHUB_OUTPUT"
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shutdown My PC ${{ github.ref_name }}
          body: |
            ## Shutdown My PC ${{ github.ref_name }}

            ### 📥 Download

            - **Windows x64** — `ShutdownMyPC.exe` (~1 MB, single file, fully portable)

            ### 🔒 Checksums

            ```
            ${{ steps.checksum.outputs.value }}  ShutdownMyPC.exe
            ```

            ### ⚡ What's inside

            A single native Windows executable (~1 MB) with:

            - **Built-in HTTP server** (C# HttpListener) — no Bun, no Node.js, no runtime needed
            - **Frontend SPA** embedded directly in the .exe — React 19 + Ant Design 5
            - **System tray icon** with right-click menu (open panel, cancel, quit)
            - **5 power actions**: Shut Down, Restart, Hibernate, Sleep, Log Off
            - **Custom countdown timer** (0鈥�s) with optional force-close
            - **Port conflict detection** — auto-prompt for a new port if 3021 is in use
            - **Single instance** — only one instance runs at a time

            ### 🚀 Usage

            1. Download and run `ShutdownMyPC.exe`.
            2. A tray icon appears in the notification area.
            3. Double-click the tray icon or right-click 鈫? "打开面板" to open the web UI.
            4. Access from other devices at `http://<your-ip>:3021/`.

            > ⚠ Windows-only. Requires .NET Framework 4.5+ (pre-installed on modern Windows).
          files: |
            ShutdownMyPC.exe
            checksums.txt
