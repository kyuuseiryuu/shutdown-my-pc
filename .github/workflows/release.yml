name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (single exe)
        run: bun run build

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShutdownMyPC-x64-windows
          path: out/ShutdownMyPC.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: shutdown-my-pc-x64-windows
          path: .

      - name: Generate checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum ShutdownMyPC.exe | cut -d' ' -f1)
          echo "$CHECKSUM  ShutdownMyPC.exe" > checksums.txt
          echo "value=$CHECKSUM" >> "$GITHUB_OUTPUT"
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shutdown My PC ${{ github.ref_name }}
          body: |
            ## Shutdown My PC ${{ github.ref_name }}

            ### 📥 Downloads

            - **Windows x64** — `ShutdownMyPC.exe` (single file, includes tray + server)

            ### 🔒 Checksums


